url: https://charlescoverdale.github.io/yieldcurves/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]

reference:
  - title: "Curve Fitting"
    desc: "Parametric and spline yield curve models"
    contents:
      - yc_nelson_siegel
      - yc_svensson
      - yc_cubic_spline
