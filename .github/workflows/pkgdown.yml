# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website
      - name: Build site
        run: |
          # Resolve downlit cache dir (R_user_dir in newer R, tempdir in older)
          cache_dir <- tryCatch(
            tools::R_user_dir("downlit", "cache"),
            error = function(e) file.path(tempdir(), "downlit")
          )
          dir.create(cache_dir, recursive = TRUE, showWarnings = FALSE)
          options(downlit.cache_dir = cache_dir)
          # Pre-seed base R packages that have no pkgdown site
          for (pkg in c("base","stats","utils","methods","grDevices","graphics","datasets","tools","grid","compiler","splines")) {
            f <- file.path(cache_dir, pkg)
            if (!file.exists(f)) saveRDS(NULL, f)
          }
          pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs

